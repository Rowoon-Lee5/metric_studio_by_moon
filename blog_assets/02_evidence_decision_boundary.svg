<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc"><title id="title">Evidence summary and decision boundary</title><desc id="desc">The figure summarises the two connected robust regions and shows that the strongest small-cap result passed a family-wise bootstrap check. The supplied delisted-stock universe is included in the raw price data and trading suspensions are screened at formation.</desc><rect width="1200" height="560" fill="#FFFFFF"/><style>text{font-family:Arial,sans-serif;fill:#1F2937}.muted{fill:#6B7280}.title{font-size:25px;font-weight:700}.sub{font-size:15px}.label{font-size:18px;font-weight:700}.value{font-size:26px;font-weight:700}.small{font-size:14px}.box{stroke:#D1D5DB;stroke-width:1.5}</style><text x="60" y="52" class="title">이 실험이 말하는 것과 말하지 않는 것</text><text x="60" y="78" class="muted sub">KRX 수정주가·거래량·시가총액 패널 · 1,728개 조합 · 월별 310개 관측치</text><rect x="60" y="115" width="510" height="185" rx="8" fill="#F8FAFC" class="box"/><text x="88" y="151" class="label">연결된 견고 전략 영역</text><text x="88" y="190" class="small">저변동성</text><rect x="220" y="175" width="260" height="20" rx="3" fill="#E5E7EB"/><rect x="220" y="175" width="260.0" height="20" rx="3" fill="#247BA0"/><text x="495" y="190" class="small">52개 조합</text><text x="88" y="242" class="small">소형주</text><rect x="220" y="227" width="260" height="20" rx="3" fill="#E5E7EB"/><rect x="220" y="227" width="60.0" height="20" rx="3" fill="#E76F51"/><text x="495" y="242" class="small">12개 조합</text><rect x="630" y="115" width="510" height="185" rx="8" fill="#F8FAFC" class="box"/><text x="658" y="151" class="label">가장 강한 검정 통과 조합</text><text x="658" y="192" class="value">t = 5.92 · 가족단위 p = 0.001</text><text x="658" y="224" class="small">소형주 · 유동성 상위 90% · 50종목 · 1억 원 · 비용 0.5배</text><text x="658" y="254" class="small">비용 차감 CAGR 38.6% · MDD -49.1% · 평균 체결률 97.6%</text><rect x="60" y="342" width="1080" height="145" rx="8" fill="#FFF7ED" stroke="#FB923C" stroke-width="1.5"/><text x="88" y="380" class="label">결론의 경계</text><text x="88" y="402" class="small">상장폐지 원본 1,336코드는 수정주가에 모두 포함됐다. 거래정지 종목은 편입 시점에 제외했다.</text><text x="88" y="432" class="small">그러나 다음 가격이 없는 433개 보유-월의 실제 결제값은 별도 사건 자료로 연결해야 한다.</text><text x="88" y="462" class="small">부트스트랩은 ‘많이 돌려 우연히 최고 결과를 찾았다’는 설명을 기각한다. 경제적 원인은 아직 검정 대상이다.</text><text x="60" y="528" class="muted small">출처: alpha_topology_nodes.csv · alpha_topology_continents.csv · reality_check_report.json</text></svg>