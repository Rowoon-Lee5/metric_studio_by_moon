<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc"><title id="title">Evidence summary and decision boundary</title><desc id="desc">The figure summarises the two connected robust regions and shows that the strongest small-cap result passed a family-wise bootstrap check but remains unsuitable as an investment conclusion because delisting bias is not yet audited.</desc><rect width="1200" height="560" fill="#FFFFFF"/><style>text{font-family:Arial,sans-serif;fill:#1F2937}.muted{fill:#6B7280}.title{font-size:25px;font-weight:700}.sub{font-size:15px}.label{font-size:18px;font-weight:700}.value{font-size:26px;font-weight:700}.small{font-size:14px}.box{stroke:#D1D5DB;stroke-width:1.5}</style><text x="60" y="52" class="title">What the experiment establishes — and what it does not</text><text x="60" y="78" class="muted sub">KRX adjusted-price, volume and market-cap panel · 1,728 tested configurations · 309 monthly observations</text><rect x="60" y="115" width="510" height="185" rx="8" fill="#F8FAFC" class="box"/><text x="88" y="151" class="label">Connected robust regions</text><text x="88" y="190" class="small">Low volatility</text><rect x="220" y="175" width="260" height="20" rx="3" fill="#E5E7EB"/><rect x="220" y="175" width="260.0" height="20" rx="3" fill="#247BA0"/><text x="495" y="190" class="small">56 nodes</text><text x="88" y="242" class="small">Small cap</text><rect x="220" y="227" width="260" height="20" rx="3" fill="#E5E7EB"/><rect x="220" y="227" width="55.7" height="20" rx="3" fill="#E76F51"/><text x="495" y="242" class="small">12 nodes</text><rect x="630" y="115" width="510" height="185" rx="8" fill="#F8FAFC" class="box"/><text x="658" y="151" class="label">Best tested node</text><text x="658" y="192" class="value">t = 6.07 · family-wise p = 0.001</text><text x="658" y="224" class="small">Small cap · liquidity top 90% · 50 holdings · KRW 100m · 0.5× cost</text><text x="658" y="254" class="small">Net CAGR 43.1% · MDD -49.3% · mean fill 97.6%</text><rect x="60" y="342" width="1080" height="145" rx="8" fill="#FFF7ED" stroke="#FB923C" stroke-width="1.5"/><text x="88" y="380" class="label">Decision boundary</text><text x="88" y="412" class="small">The bootstrap result rejects a simple “best result from many trials” explanation. It does not remove survivorship or delisting bias.</text><text x="88" y="442" class="small">Therefore this is a strong hypothesis for the next audit, not an investable small-cap strategy.</text><text x="60" y="528" class="muted small">Source: results/alpha_topology_nodes.csv, results/alpha_topology_continents.csv, results/reality_check_report.json</text></svg>